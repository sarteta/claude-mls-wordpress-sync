name: docker
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t claude-mls-wordpress-sync:ci .
      - name: Show image size
        run: docker images claude-mls-wordpress-sync:ci
      - name: Smoke test (mock provider, dry-run)
        run: docker run --rm claude-mls-wordpress-sync:ci
